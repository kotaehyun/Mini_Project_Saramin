    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";

      const root = document.getElementById("space-flow-root");
      const fallback = document.getElementById("space-flow-fallback");
      const contractRail = document.getElementById("space-flow-contract-rail");
      const nodeData = [{"name": "START", "label": "START", "status": "완료", "order": 0, "contract": {"module": "run_job_search_workflow*", "role": "사용자 요청을 LangGraph 상태로 초기화", "inputs": ["keyword: str", "user_profile: Dict[str, Any]"], "outputs": ["state: JobSearchState"], "reads": ["CLI or Streamlit form values"], "writes": ["keyword: str", "user_profile: Dict[str, Any]", "raw_jobs: List[Dict[str, Any]] = []", "processed_jobs: List[Dict[str, Any]] = []", "evaluation_results: List[Dict[str, Any]] = []", "summary: Dict[str, Any] = {}", "error: str = ''"]}}, {"name": "검색 URL 생성", "label": "URL", "status": "완료", "order": 1, "contract": {"module": "crawlers.saramin_crawler.generate_search_url", "role": "검색어와 페이지 번호를 사람인 목록 URL로 변환", "inputs": ["keyword: str", "page: int"], "outputs": ["search_url: str"], "reads": ["state.keyword: str"], "writes": ["HTTP request target URL: str"]}}, {"name": "사람인 공고 크롤링", "label": "CRAWL", "status": "완료", "order": 2, "contract": {"module": "graphs.job_graph.crawl_jobs_node", "role": "사람인 목록 응답을 공고 딕셔너리 목록으로 추출", "inputs": ["state: JobSearchState", "state.keyword: str"], "outputs": ["raw_jobs: List[Dict[str, Any]]", "raw_jobs[i]: JobPosting-like dict"], "reads": ["keyword: str", "search_url: str per page"], "writes": ["state.raw_jobs: List[Dict[str, Any]]", "state.error: str"]}}, {"name": "공고 데이터 전처리", "label": "PREP", "status": "완료", "order": 3, "contract": {"module": "graphs.job_graph.preprocess_jobs_node", "role": "공고를 정제하고 LLM용 설명 문자열을 추가", "inputs": ["raw_jobs: List[Dict[str, Any]]"], "outputs": ["processed_jobs: List[Dict[str, Any]]", "processed_jobs[i].job_description: str"], "reads": ["state.raw_jobs: List[Dict[str, Any]]"], "writes": ["state.processed_jobs: List[Dict[str, Any]]", "state.error: str"]}}, {"name": "LLM 적합도 평가", "label": "LLM", "status": "완료", "order": 4, "contract": {"module": "graphs.job_graph.filter_jobs_node", "role": "프로필과 공고를 비교해 공고별 평가 JSON 생성", "inputs": ["user_profile: Dict[str, Any]", "processed_jobs: List[Dict[str, Any]]"], "outputs": ["evaluation_results: List[Dict[str, Any]]", "evaluation_results[i]: EvaluationResult-like dict"], "reads": ["state.user_profile: Dict[str, Any]", "state.processed_jobs: List[Dict[str, Any]]"], "writes": ["state.evaluation_results: List[Dict[str, Any]]", "state.error: str"]}}, {"name": "결과 요약 생성", "label": "SUM", "status": "완료", "order": 5, "contract": {"module": "graphs.job_graph.summarize_result_node", "role": "평가 결과 빈도와 추천 요약을 생성", "inputs": ["user_profile: Dict[str, Any]", "evaluation_results: List[Dict[str, Any]]"], "outputs": ["summary: Dict[str, Any]"], "reads": ["state.user_profile: Dict[str, Any]", "state.evaluation_results: List[Dict[str, Any]]"], "writes": ["state.summary: Dict[str, Any]", "state.error: str"]}}, {"name": "결과 파일 저장", "label": "SAVE", "status": "완료", "order": 6, "contract": {"module": "utils.output_formatter + Streamlit caller", "role": "평가 산출물을 다운로드 가능한 파일로 저장", "inputs": ["evaluation_results: List[Dict[str, Any]]", "summary: Dict[str, Any]", "user_profile: Dict[str, Any]"], "outputs": ["json_path: str", "csv_path: str", "md_path: str"], "reads": ["state.evaluation_results: List[Dict[str, Any]]", "state.summary: Dict[str, Any]"], "writes": ["data/results/*.json", "data/results/*.csv", "data/results/*.md"]}}, {"name": "END", "label": "END", "status": "완료", "order": 7, "contract": {"module": "LangGraph END / UI result surface", "role": "최종 상태와 저장 파일을 결과 화면으로 전달", "inputs": ["final_state: JobSearchState", "saved_paths: Dict[str, str] in caller"], "outputs": ["dashboard tables", "download files"], "reads": ["raw_jobs / processed_jobs", "evaluation_results / summary"], "writes": ["No further JobSearchState mutation"]}}];
      const progressData = {"completed": 6, "running": 0, "failed": 0, "total": 6, "percent": 100};
      const help = document.createElement("div");
      help.id = "space-flow-help";
      help.textContent = "Workflow surface";
      root.appendChild(help);

      const progress = document.createElement("div");
      progress.id = "space-flow-progress";
      progress.innerHTML = `
        <strong>${progressData.percent}%</strong>
        완료 ${progressData.completed} / ${progressData.total}
        · 진행중 ${progressData.running}
        · 실패 ${progressData.failed}
        <div class="progress-track">
          <div class="progress-fill" style="width:${progressData.percent}%"></div>
        </div>
      `;
      root.appendChild(progress);

      const info = document.createElement("div");
      info.id = "space-flow-info";
      root.appendChild(info);

      let selectedOrder = 0;
      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }
      function contractList(title, values) {
        return `
          <div class="info-list">
            <b>${escapeHtml(title)}</b>
            ${values.map((value) => `<code>${escapeHtml(value)}</code>`).join("")}
          </div>
        `;
      }
      function updateContractSelection(order) {
        selectedOrder = order;
        contractRail.querySelectorAll(".contract-card").forEach((card) => {
          card.classList.toggle("is-selected", Number(card.dataset.order) === order);
        });
      }
      function showContract(node, themeName = "") {
        const contract = node.contract;
        updateContractSelection(node.order);
        info.innerHTML = `
          <div class="info-title">
            <strong>${node.order + 1}. ${escapeHtml(node.name)}</strong>
            <span>${escapeHtml(contract.module)}${themeName ? ` · ${escapeHtml(themeName)}` : ""}</span>
          </div>
          <p class="info-role">${escapeHtml(contract.role)} · 상태 ${escapeHtml(node.status)}</p>
          <div class="info-grid">
            ${contractList("Input type", contract.inputs)}
            ${contractList("Output type", contract.outputs)}
            ${contractList("State reads", contract.reads)}
            ${contractList("State writes", contract.writes)}
          </div>
        `;
      }
      function compactIo(title, values) {
        return `
          <div class="contract-io">
            <b>${escapeHtml(title)}</b>
            ${values.slice(0, 2).map((value) => `<code>${escapeHtml(value)}</code>`).join("")}
          </div>
        `;
      }
      function renderContractRail() {
        contractRail.innerHTML = nodeData.map((node, index) => `
          <div class="contract-step">
            <article class="contract-card" data-order="${node.order}">
              <div class="contract-node">
                <span>${escapeHtml(node.label)}</span>
                <em>${escapeHtml(node.status)}</em>
              </div>
              ${compactIo("Input", node.contract.inputs)}
              ${compactIo("Output", node.contract.outputs)}
            </article>
            ${index < nodeData.length - 1 ? `<span class="contract-link">-></span>` : ""}
          </div>
        `).join("");
      }
      renderContractRail();
      contractRail.addEventListener("click", (event) => {
        const card = event.target.closest(".contract-card");
        if (!card) return;
        const node = nodeData.find((item) => item.order === Number(card.dataset.order));
        if (node) showContract(node);
      });
      showContract(nodeData[0]);

      const actions = document.createElement("div");
      actions.id = "space-flow-actions";
      actions.innerHTML = `
        <button data-camera="front">Front</button>
        <button data-camera="top">Top</button>
        <button data-camera="side">Side</button>
        <button data-camera="wide">Wide</button>
        <button data-action="pause">Pause</button>
      `;
      root.appendChild(actions);

      fallback.style.display = "none";

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x090f1a, 16, 62);

      const camera = new THREE.PerspectiveCamera(52, root.clientWidth / root.clientHeight, 0.1, 100);
      camera.position.set(0, 3.9, 15.5);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setClearColor(0x03060d, 1);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(root.clientWidth, root.clientHeight);
      root.appendChild(renderer.domElement);
      renderer.domElement.style.touchAction = "none";

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.enablePan = true;
      controls.enableZoom = true;
      controls.minDistance = 8.5;
      controls.maxDistance = 26;
      controls.maxPolarAngle = Math.PI * 0.82;
      controls.minPolarAngle = Math.PI * 0.18;

      let paused = false;
      function moveCamera(position) {
        camera.position.set(position.x, position.y, position.z);
        camera.lookAt(0, 0, 0);
        controls.target.set(0, 0, 0);
        controls.update();
      }
      actions.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        const cameraMode = button.dataset.camera;
        if (cameraMode === "front") moveCamera({ x: 0, y: 3.9, z: 15.5 });
        if (cameraMode === "top") moveCamera({ x: 0, y: 17.5, z: 0.8 });
        if (cameraMode === "side") moveCamera({ x: 16.5, y: 3.8, z: 2.5 });
        if (cameraMode === "wide") moveCamera({ x: 0, y: 8.5, z: 24 });
        if (button.dataset.action === "pause") {
          paused = !paused;
          button.textContent = paused ? "Play" : "Pause";
        }
      });

      const ambient = new THREE.AmbientLight(0xffffff, 1.05);
      scene.add(ambient);

      const keyLight = new THREE.PointLight(0xffffff, 2.2, 40);
      keyLight.position.set(-6, 8, 8);
      scene.add(keyLight);

      const accentLight = new THREE.PointLight(0xff7a17, 0.88, 35);
      accentLight.position.set(7, -3, 6);
      scene.add(accentLight);

      const statusColor = {
        "대기": 0x7d8187,
        "진행중": 0xff7a17,
        "완료": 0xffffff,
        "실패": 0xc4b5fd,
      };

      const nodeGroup = new THREE.Group();
      scene.add(nodeGroup);

      const labels = [];
      const starNodes = [];
      const starGlows = [];
      const positions = [];

      nodeData.forEach((node, index) => {
        const t = index / (nodeData.length - 1);
        const x = -8.8 + t * 17.6;
        const y = Math.sin(t * Math.PI * 2.2) * 1.35;
        const z = Math.cos(t * Math.PI * 1.5) * 1.15;
        positions.push(new THREE.Vector3(x, y, z));

        const color = statusColor[node.status] || statusColor["대기"];
        const radius = index === 0 || index === nodeData.length - 1 ? 0.28 : 0.22;

        const star = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 28, 20),
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: node.status === "완료" ? 0.98 : node.status === "진행중" ? 0.9 : 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          })
        );
        star.position.set(x, y, z);
        star.userData.node = node;
        nodeGroup.add(star);
        starNodes.push(star);

        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(radius * 2.1, 24, 14),
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: node.status === "진행중" ? 0.24 : 0.12,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          })
        );
        glow.position.copy(star.position);
        nodeGroup.add(glow);
        starGlows.push(glow);

        const label = document.createElement("div");
        label.className = "node-label";
        label.innerHTML = `<span>${node.order + 1}. ${node.label}</span><span class="node-status">${node.status}</span>`;
        root.appendChild(label);
        labels.push({ element: label, target: star });
      });

      const pathPoints = [];
      for (let i = 0; i < positions.length - 1; i += 1) {
        const start = positions[i];
        const end = positions[i + 1];
        for (let j = 0; j < 18; j += 1) {
          const p = start.clone().lerp(end, j / 18);
          p.y += Math.sin((j / 18) * Math.PI) * 0.35;
          pathPoints.push(p);
        }
      }
      pathPoints.push(positions[positions.length - 1].clone());

      const curve = new THREE.CatmullRomCurve3(pathPoints);
      const energyTrack = new THREE.Mesh(
        new THREE.TubeGeometry(curve, 220, 0.018, 12, false),
        new THREE.MeshBasicMaterial({
          color: 0xa8d8ff,
          transparent: true,
          opacity: 0.24,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        })
      );
      scene.add(energyTrack);

      const constellationLines = [];
      const linkMaterial = new THREE.LineBasicMaterial({
        color: 0x9ccfff,
        transparent: true,
        opacity: 0.36,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      for (let i = 0; i < positions.length - 1; i += 1) {
        const lineGeometry = new THREE.BufferGeometry().setFromPoints([positions[i], positions[i + 1]]);
        const line = new THREE.Line(lineGeometry, linkMaterial.clone());
        line.userData.phase = i * 0.38;
        scene.add(line);
        constellationLines.push(line);
      }

      const packet = new THREE.Mesh(
        new THREE.SphereGeometry(0.16, 32, 16),
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          emissive: 0xff7a17,
          emissiveIntensity: 0.95,
        })
      );
      scene.add(packet);

      function createStarLayer(count, spread, color, size, opacity) {
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        const colors = [];
        const base = new THREE.Color(color);
        for (let i = 0; i < count; i += 1) {
          vertices.push(
            (Math.random() - 0.5) * spread.x,
            (Math.random() - 0.5) * spread.y,
            (Math.random() - 0.5) * spread.z
          );
          const twinkle = 0.8 + Math.random() * 0.4;
          colors.push(base.r * twinkle, base.g * twinkle, base.b * twinkle);
        }
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
        return new THREE.Points(
          geometry,
          new THREE.PointsMaterial({
            size,
            transparent: true,
            opacity,
            vertexColors: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
          })
        );
      }

      const guideDotsNear = createStarLayer(360, { x: 36, y: 18, z: 24 }, 0xc8e7ff, 0.034, 0.62);
      const guideDotsFar = createStarLayer(720, { x: 70, y: 34, z: 52 }, 0xf5fbff, 0.021, 0.38);
      scene.add(guideDotsFar, guideDotsNear);

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();

      function inspectNode(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        const clientX = event.clientX ?? event.changedTouches?.[0]?.clientX;
        const clientY = event.clientY ?? event.changedTouches?.[0]?.clientY;
        if (clientX === undefined || clientY === undefined) return;

        pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(starNodes, false);
        if (!hits.length) return;

        const node = hits[0].object.userData.node;
        showContract(node, node.label);
      }

      renderer.domElement.addEventListener("click", inspectNode);
      renderer.domElement.addEventListener("touchend", inspectNode);

      function updateLabels() {
        labels.forEach((item) => {
          const vector = item.target.position.clone();
          vector.project(camera);
          const x = (vector.x * 0.5 + 0.5) * root.clientWidth;
          const y = (-vector.y * 0.5 + 0.5) * root.clientHeight + 44;
          item.element.style.left = `${x}px`;
          item.element.style.top = `${y}px`;
        });
      }

      function animate(time) {
        const elapsed = time * 0.001;

        if (!paused) {
          guideDotsFar.rotation.y = elapsed * 0.008;
          guideDotsNear.rotation.y = elapsed * 0.018;
          nodeGroup.rotation.y = Math.sin(elapsed * 0.22) * 0.08;
        }

        starNodes.forEach((star) => {
          if (!paused) {
            star.rotation.y += star.userData.node.status === "진행중" ? 0.02 : 0.007;
          }
        });

        starGlows.forEach((glow, index) => {
          const pulse = 0.9 + Math.sin(elapsed * 1.5 + index) * 0.12;
          glow.scale.setScalar(pulse);
          glow.material.opacity = starNodes[index].userData.node.status === "진행중" ? 0.22 : 0.1;
        });

        constellationLines.forEach((line) => {
          line.material.opacity = 0.28 + Math.sin(elapsed * 1.1 + line.userData.phase) * 0.08;
        });

        energyTrack.material.opacity = 0.24 + Math.sin(elapsed * 1.8) * 0.08;

        const packetPoint = curve.getPoint(((paused ? 0 : elapsed) * 0.08) % 1);
        packet.position.copy(packetPoint);
        packet.scale.setScalar(1 + Math.sin(elapsed * 2.5) * 0.05);

        controls.update();
        updateLabels();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = root.clientWidth / root.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(root.clientWidth, root.clientHeight);
      });

      requestAnimationFrame(animate);
    </script>
